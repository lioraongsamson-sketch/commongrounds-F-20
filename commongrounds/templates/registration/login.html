{% extends 'base.html' %}
{% load static %}

{% block page_heading %} <h2 class="heading">Login</h2> {% endblock %}

{% block content %}

    <div class="login">
        <form method="POST">
        {% csrf_token %}
            <div>
                {{form.as_p}}

        </form> 
    </div>
    <a class="pw" href="{% url 'password_reset' %}">Forgot password?</a>
    
    
{% endblock %}
