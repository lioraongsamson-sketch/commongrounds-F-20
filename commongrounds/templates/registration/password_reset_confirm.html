{% extends 'base.html' %}
{% load static %}

{% block page_heading %} <h2 class="heading">Password Reset</h2>{% endblock %}

{% block content %}
    <div class="login">
        {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Change password">
        </form>
        {% else %}
            <p> Invalid password reset link! </p>
        {% endif %}
    </div>
    
{% endblock %}
