{% extends "base.html" %}

{% block content %}
    <h3>Book Club</h3>
    <h4>Bookshelf</h4>

    <a href="{% url 'bookclub:book_create' %}">Contribute a Book</a>

    <ul>
        {% for books in book_list %}
            <li>
                <a href = "{{ books.get_absolute_url }}">
                    {{ books.title }}
                </a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
