{% block content %}
    <h1>DIY Projects</h1>
    <h3>Edit Project</h3>

    <form method="post">
        {% csrf_token %}

        <p>
            <label>Title:</label><br>
            {{ form.title }}
        </p>

        <p>
            <label>Category:</label><br>
            {{ form.category }}
        </p>

        <p>
            <label>Status:</label><br>
            {{ form.status }}
        </p>

        <p>
            <label>Description:</label><br>
            {{ form.description }}
        </p>

        <p>
            <label>Materials:</label><br>
            {{ form.materials }}
        </p>

        <p>
            <label>Steps:</label><br>
            {{ form.steps }}
        </p>

        <button type="submit">Update Project</button>
    </form>

    <br>
    <a href="{% url 'diyprojects:project_detail' object.pk %}">Cancel</a>

{% endblock %}
