{% extends 'base.html' %}

{% block content %}
    <h1>DIY Projects</h1>
    <h3>Project List</h3>
    {% for project in projects %}
    <h4> {{category.name}} </h4>
    <li>
        <a href="{{ project.get_absolute_url }}"> {{ project.title }} ({{ project.status }}) </a>
    </li>
    {% empty %}
        <p>No projects found.</p>
    {% endfor %}
{% endblock %}
