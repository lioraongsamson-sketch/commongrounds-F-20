{% extends 'base.html' %}

{% block content %}
    <h3>Create New Event</h3>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <input type="submit" name="submit" value="Save Form">
    </form>
    <br>
    <a href="{% url 'localevents:event_list' %}">Go Back</a>
{% endblock %}
