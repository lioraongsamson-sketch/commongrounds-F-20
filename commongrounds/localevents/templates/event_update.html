{% extends 'base.html' %}

{% block content %}
<h2>Update Event: {{ event.title }}</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form }}
    <br>
    <button type="submit" name="submit">Save Updates</button>
</form>
<br>
<a href="{% url 'localevents:event_detail' event.pk %}">Cancel Changes</a>
{% endblock %}
