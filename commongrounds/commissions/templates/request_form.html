{% extends 'base.html' %}
{% load static %}

{% block content %}
    <h2>{{ previous }} Commission</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form }}

        <h3>Jobs</h3>
        {{ job_formset.management_form }}
        {% for job_form in job_formset %}
            <ul>
                <li>
                    {{ job_form }}
                </li>
            </ul>
            
        {% endfor %}

        <input type="submit" name="submit" value="Save Form">
    </form>

    <p><a href="/commissions/requests">Home</a></p>

{% endblock %}
